<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=340">
<title>SensorBridge Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1e293b;
    font-size: 13px;
    padding: 0;
    user-select: none;
  }
  .title-bar {
    background: #334155;
    color: #fff;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
  }
  .status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 400; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
  .status-dot.connected { background: #22c55e; }
  .status-dot.disconnected { background: #ef4444; }
  .status-dot.connecting { background: #f59e0b; }
  .section { background: #ffffff; padding: 10px 12px; }
  .section-label { font-weight: 600; font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .toggle-group { display: inline-flex; gap: 2px; background: #e2e8f0; border-radius: 6px; padding: 2px; vertical-align: middle; }
  .toggle-btn { padding: 2px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; background: transparent; color: #64748b; transition: all 0.15s; }
  .toggle-btn.active-real { background: #ffffff; color: #334155; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .toggle-btn.active-sim { background: #fef3c7; color: #92400e; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .row { display: flex; gap: 0; }
  .row > .col { flex: 1; }
  .dpad { display: grid; grid-template-columns: repeat(5, 28px); grid-template-rows: repeat(5, 28px); gap: 2px; justify-content: center; }
  .dpad-btn { width: 28px; height: 28px; border: 1px solid #cbd5e1; border-radius: 5px; background: #f1f5f9; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #475569; font-weight: 600; }
  .dpad-btn:hover { background: #e2e8f0; }
  .dpad-btn:active { background: #cbd5e1; }
  .dpad-btn:disabled { opacity: 0.3; cursor: default; }
  .coord-display { text-align: center; font-size: 10px; color: #64748b; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .slider-row { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
  .slider-row input[type="range"] { flex: 1; accent-color: #6366f1; height: 16px; }
  .slider-row input[type="range"]:disabled { opacity: 0.3; }
  .slider-val { min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; font-size: 11px; color: #334155; font-weight: 600; }
  .step-btn { width: 22px; height: 22px; border: 1px solid #cbd5e1; border-radius: 4px; background: #f1f5f9; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #475569; flex-shrink: 0; }
  .step-btn:hover { background: #e2e8f0; }
  .step-btn:active { background: #cbd5e1; }
  .step-btn:disabled { opacity: 0.3; cursor: default; }
  .denied-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .denied-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #ef4444; cursor: pointer; }
  .denied-row input[type="checkbox"]:disabled { opacity: 0.3; cursor: default; }
  .dial-wrapper { position: relative; width: 110px; height: 110px; cursor: pointer; margin: 0 auto; }
  .dial-wrapper.disabled { opacity: 0.3; pointer-events: none; }
  .dial-track { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #e2e8f0; position: relative; }
  .dial-needle { position: absolute; top: 50%; left: 50%; width: 2px; height: 42px; background: #6366f1; border-radius: 1px; transform-origin: bottom center; transform: translateX(-50%) translateY(-100%) rotate(0deg); }
  .dial-center-dot { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #6366f1; border-radius: 50%; transform: translate(-50%, -50%); }
  .dial-dir { position: absolute; font-size: 10px; color: #94a3b8; font-weight: 600; }
  .dial-dir-n { top: 4px; left: 50%; transform: translateX(-50%); }
  .dial-dir-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .dial-dir-e { top: 50%; right: 6px; transform: translateY(-50%); }
  .dial-dir-w { top: 50%; left: 6px; transform: translateY(-50%); }
  .border-bottom { border-bottom: 1px solid #e2e8f0; }
  .border-right { border-right: 1px solid #e2e8f0; }
  .mode-btn {
    padding: 2px 8px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    background: #f1f5f9;
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    transition: all 0.15s;
  }
  .mode-btn:hover { background: #e2e8f0; }
  .mode-btn:disabled { opacity: 0.3; cursor: default; }
  .mode-btn.active {
    background: #dbeafe;
    color: #1e40af;
    border-color: #93c5fd;
  }
</style>
</head>
<body>
<div class="title-bar">
  <span>SensorBridge Remote</span>
  <div class="status">
    <div class="status-dot connecting" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>
</div>
<div class="row border-bottom">
  <div class="col section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span class="section-label" style="margin-bottom:0;">Position</span>
      <div class="toggle-group">
        <button class="toggle-btn active-real" id="pos-real" onclick="setMode('position','real')">real</button>
        <button class="toggle-btn" id="pos-sim" onclick="setMode('position','sim')">sim</button>
      </div>
    </div>
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" disabled data-dir="330">NNW</button>
      <button class="dpad-btn" disabled data-dir="0">N</button>
      <button class="dpad-btn" disabled data-dir="30">NNE</button>
      <div></div>
      <button class="dpad-btn" disabled data-dir="300">WNW</button>
      <div></div><div></div><div></div>
      <button class="dpad-btn" disabled data-dir="60">ENE</button>
      <button class="dpad-btn" disabled data-dir="270">W</button>
      <div></div><div></div><div></div>
      <button class="dpad-btn" disabled data-dir="90">E</button>
      <button class="dpad-btn" disabled data-dir="240">WSW</button>
      <div></div><div></div><div></div>
      <button class="dpad-btn" disabled data-dir="120">ESE</button>
      <div></div>
      <button class="dpad-btn" disabled data-dir="210">SSW</button>
      <button class="dpad-btn" disabled data-dir="180">S</button>
      <button class="dpad-btn" disabled data-dir="150">SSE</button>
      <div></div>
    </div>
    <div class="coord-display" id="coordDisplay">&mdash;</div>
    <div style="display:flex;gap:3px;justify-content:center;margin-top:4px;" id="dpadModeGroup">
      <button class="mode-btn active" disabled id="mode-sync" onclick="setDpadMode('sync')">sync</button>
      <button class="mode-btn" disabled id="mode-interval" onclick="setDpadMode('interval')">intv</button>
      <button class="mode-btn" disabled id="mode-lost" onclick="setDpadMode('lost')">lost</button>
    </div>
  </div>
  <div class="col section">
    <div class="section-label">Callback interval</div>
    <div class="slider-row">
      <button class="step-btn" disabled id="interval-down" data-target="intervalSlider" data-step="-500">&#9664;</button>
      <input type="range" min="500" max="30000" step="500" value="1000" disabled id="intervalSlider" oninput="onInterval(this.value)">
      <button class="step-btn" disabled id="interval-up" data-target="intervalSlider" data-step="500">&#9654;</button>
      <span class="slider-val" id="intervalVal">1.0 s</span>
    </div>
    <div class="section-label" style="margin-top:10px;">Accuracy</div>
    <div class="slider-row">
      <button class="step-btn" disabled id="acc-down" data-target="accSlider" data-step="-5">&#9664;</button>
      <input type="range" min="5" max="500" step="5" value="10" disabled id="accSlider" oninput="onAccuracy(this.value)">
      <button class="step-btn" disabled id="acc-up" data-target="accSlider" data-step="5">&#9654;</button>
      <span class="slider-val" id="accVal">10 m</span>
    </div>
    <div class="denied-row">
      <span class="section-label" style="margin-bottom:0;">Denied</span>
      <input type="checkbox" id="deniedCheck" disabled onchange="onDeniedChange(this.checked)">
    </div>
  </div>
</div>
<div class="row border-bottom">
  <div class="col section border-right">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span class="section-label" style="margin-bottom:0;">Heading</span>
      <div class="toggle-group">
        <button class="toggle-btn active-real" id="hdg-real" onclick="setMode('heading','real')">real</button>
        <button class="toggle-btn" id="hdg-sim" onclick="setMode('heading','sim')">sim</button>
      </div>
    </div>
    <div style="padding:8px 0;">
      <div class="dial-wrapper disabled" id="dialWrapper">
        <div class="dial-track">
          <span class="dial-dir dial-dir-n">N</span>
          <span class="dial-dir dial-dir-s">S</span>
          <span class="dial-dir dial-dir-e">E</span>
          <span class="dial-dir dial-dir-w">W</span>
          <div class="dial-needle" id="dialNeedle"></div>
          <div class="dial-center-dot"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;">
      <input type="checkbox" id="headingSyncCheck" checked disabled onchange="onHeadingSyncChange(this.checked)" style="width:14px;height:14px;accent-color:#6366f1;">
      <label for="headingSyncCheck" style="font-size:10px;color:#64748b;font-weight:600;">sync</label>
    </div>
  </div>
  <div class="col section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span class="section-label" style="margin-bottom:0;">Speed</span>
      <div class="toggle-group">
        <button class="toggle-btn active-real" id="spd-real" onclick="setMode('speed','real')">real</button>
        <button class="toggle-btn" id="spd-sim" onclick="setMode('speed','sim')">sim</button>
      </div>
    </div>
    <div class="slider-row" style="margin-top:16px;">
      <button class="step-btn" disabled id="spd-down" data-target="speedSlider" data-step="-1">&#9664;</button>
      <input type="range" min="0" max="150" step="1" value="0" disabled id="speedSlider" oninput="onSpeed(this.value)">
      <button class="step-btn" disabled id="spd-up" data-target="speedSlider" data-step="1">&#9654;</button>
    </div>
    <div style="text-align:right;margin-top:4px;">
      <span class="slider-val" id="speedVal">0 km/h</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:4px;">
      <input type="checkbox" id="speedSyncCheck" checked disabled onchange="onSpeedSyncChange(this.checked)" style="width:14px;height:14px;accent-color:#6366f1;">
      <label for="speedSyncCheck" style="font-size:10px;color:#64748b;font-weight:600;">sync</label>
    </div>
  </div>
</div>
<script>
(function() {
  var CHANNEL_NAME = 'flexroute-sensor-bridge';
  var channel = new BroadcastChannel(CHANNEL_NAME);
  var state = {
    channelModes: { position: 'real', heading: 'real', speed: 'real' },
    simValues: { position: null, heading: 0, speed: 0, accuracy: 10, callbackIntervalMs: 1000, denied: false, positionCallbackMode: 'sync', headingSync: true, speedSync: true }
  };
  var connected = false;
  var connectTimer = setTimeout(function() { if (!connected) setConnectionStatus('disconnected'); }, 3000);
  channel.postMessage({ type: 'remote-ready' });
  channel.onmessage = function(event) {
    var msg = event.data;
    if (!msg || msg.type !== 'state-sync') return;
    if (!connected) { connected = true; clearTimeout(connectTimer); setConnectionStatus('connected'); }
    state.channelModes = msg.channelModes;
    state.simValues = msg.simValues;
    updateUI();
  };
  window.addEventListener('beforeunload', function() {
    try {
      localStorage.setItem('flexroute:simPopupBounds', JSON.stringify({
        width: window.outerWidth,
        height: window.outerHeight,
        left: window.screenX,
        top: window.screenY
      }));
    } catch(e) {}
    try {
      channel.postMessage({ type: 'remote-close' });
    } catch(e) {}
  });
  function updateUI() {
    updateToggle('position', state.channelModes.position);
    updateToggle('heading', state.channelModes.heading);
    updateToggle('speed', state.channelModes.speed);
    var posIsSim = state.channelModes.position === 'sim';
    var hdgIsSim = state.channelModes.heading === 'sim';
    var spdIsSim = state.channelModes.speed === 'sim';
    var dpadBtnsAll = document.querySelectorAll('.dpad-btn');
    for (var i = 0; i < dpadBtnsAll.length; i++) dpadBtnsAll[i].disabled = !posIsSim;
    var pos = state.simValues.position;
    document.getElementById('coordDisplay').textContent = pos ? pos.lat.toFixed(4) + ', ' + pos.lng.toFixed(4) : '\u2014';
    var is2 = document.getElementById('intervalSlider');
    is2.disabled = !posIsSim; is2.value = String(state.simValues.callbackIntervalMs);
    document.getElementById('intervalVal').textContent = (state.simValues.callbackIntervalMs / 1000).toFixed(1) + ' s';
    document.getElementById('interval-down').disabled = !posIsSim;
    document.getElementById('interval-up').disabled = !posIsSim;
    var as2 = document.getElementById('accSlider');
    as2.disabled = !posIsSim; as2.value = String(state.simValues.accuracy);
    document.getElementById('accVal').textContent = state.simValues.accuracy + ' m';
    document.getElementById('acc-down').disabled = !posIsSim;
    document.getElementById('acc-up').disabled = !posIsSim;
    var dc = document.getElementById('deniedCheck');
    dc.disabled = !posIsSim; dc.checked = state.simValues.denied;
    // D-pad mode
    var modes = ['sync', 'interval', 'lost'];
    for (var m = 0; m < modes.length; m++) {
      var mb = document.getElementById('mode-' + modes[m]);
      mb.disabled = !posIsSim;
      mb.className = 'mode-btn' + (modes[m] === state.simValues.positionCallbackMode ? ' active' : '');
    }
    // Heading sync
    var hsc = document.getElementById('headingSyncCheck');
    hsc.disabled = !hdgIsSim;
    hsc.checked = state.simValues.headingSync;
    // Speed sync
    var ssc = document.getElementById('speedSyncCheck');
    ssc.disabled = !spdIsSim;
    ssc.checked = state.simValues.speedSync;
    var dw = document.getElementById('dialWrapper');
    if (hdgIsSim) dw.classList.remove('disabled'); else dw.classList.add('disabled');
    document.getElementById('dialNeedle').style.transform = 'translateX(-50%) translateY(-100%) rotate(' + state.simValues.heading + 'deg)';
    var kmh = Math.round(state.simValues.speed * 3.6);
    var ss = document.getElementById('speedSlider');
    ss.disabled = !spdIsSim; ss.value = String(kmh);
    document.getElementById('speedVal').textContent = kmh + ' km/h';
    document.getElementById('spd-down').disabled = !spdIsSim;
    document.getElementById('spd-up').disabled = !spdIsSim;
  }
  function updateToggle(ch, mode) {
    var prefixes = { position: 'pos', heading: 'hdg', speed: 'spd' };
    var prefix = prefixes[ch];
    document.getElementById(prefix + '-real').className = 'toggle-btn' + (mode === 'real' ? ' active-real' : '');
    document.getElementById(prefix + '-sim').className = 'toggle-btn' + (mode === 'sim' ? ' active-sim' : '');
  }
  function setConnectionStatus(s) {
    document.getElementById('statusDot').className = 'status-dot ' + s;
    document.getElementById('statusText').textContent = s === 'connected' ? 'connected' : s === 'disconnected' ? 'disconnected' : 'connecting...';
  }
  // Heading dial
  var dialDragging = false;
  function getAngleFromEvent(e) {
    var rect = document.getElementById('dialWrapper').getBoundingClientRect();
    var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var deg = Math.round(Math.atan2(clientX - cx, -(clientY - cy)) * 180 / Math.PI);
    if (deg < 0) deg += 360;
    return deg;
  }
  function applyDialAngle(e) {
    var deg = getAngleFromEvent(e);
    state.simValues.heading = deg;
    channel.postMessage({ type: 'set-sim-heading', value: deg });
    document.getElementById('dialNeedle').style.transform = 'translateX(-50%) translateY(-100%) rotate(' + deg + 'deg)';
  }
  document.getElementById('dialWrapper').addEventListener('mousedown', function(e) {
    if (this.classList.contains('disabled')) return; dialDragging = true; applyDialAngle(e);
  });
  document.addEventListener('mousemove', function(e) { if (dialDragging) applyDialAngle(e); });
  document.addEventListener('mouseup', function() { dialDragging = false; });
  document.getElementById('dialWrapper').addEventListener('touchstart', function(e) {
    if (this.classList.contains('disabled')) return; dialDragging = true; applyDialAngle(e); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', function(e) { if (dialDragging) { applyDialAngle(e); e.preventDefault(); } }, { passive: false });
  document.addEventListener('touchend', function() { dialDragging = false; });
  // Step buttons with long press
  var stepTimer = null;
  function stepOnce(btn) {
    var slider = document.getElementById(btn.getAttribute('data-target'));
    var step = parseInt(btn.getAttribute('data-step'), 10);
    var v = Math.min(parseInt(slider.max, 10), Math.max(parseInt(slider.min, 10), parseInt(slider.value, 10) + step));
    slider.value = String(v);
    slider.dispatchEvent(new Event('input'));
  }
  function startStep(btn) {
    if (btn.disabled) return;
    stepOnce(btn);
    stepTimer = setTimeout(function repeat() { stepOnce(btn); stepTimer = setTimeout(repeat, 50); }, 300);
  }
  function stopStep() { if (stepTimer !== null) { clearTimeout(stepTimer); stepTimer = null; } }
  var stepBtns = document.querySelectorAll('.step-btn');
  for (var s = 0; s < stepBtns.length; s++) {
    (function(btn) {
      btn.addEventListener('mousedown', function() { startStep(btn); });
      btn.addEventListener('touchstart', function(e) { startStep(btn); e.preventDefault(); }, { passive: false });
    })(stepBtns[s]);
  }
  document.addEventListener('mouseup', stopStep);
  document.addEventListener('touchend', stopStep);
  document.addEventListener('mouseleave', stopStep);
  // D-pad long press
  var dpadTimer = null;
  function dpadOnce(btn) {
    var deg = parseInt(btn.getAttribute('data-dir'), 10);
    if (!isNaN(deg)) movePos(deg);
  }
  function startDpad(btn) {
    if (btn.disabled) return;
    dpadOnce(btn);
    dpadTimer = setInterval(function() { dpadOnce(btn); }, 500);
  }
  function stopDpad() {
    if (dpadTimer !== null) { clearInterval(dpadTimer); dpadTimer = null; }
  }
  var dpadBtnsAll = document.querySelectorAll('.dpad-btn');
  for (var d = 0; d < dpadBtnsAll.length; d++) {
    (function(btn) {
      btn.addEventListener('mousedown', function() { startDpad(btn); });
      btn.addEventListener('touchstart', function(e) { startDpad(btn); e.preventDefault(); }, { passive: false });
    })(dpadBtnsAll[d]);
  }
  document.addEventListener('mouseup', stopDpad);
  document.addEventListener('touchend', stopDpad);
  // Actions
  window.setMode = function(ch, mode) {
    state.channelModes[ch] = mode;
    channel.postMessage({ type: 'set-channel-mode', channel: ch, mode: mode });
    updateUI();
  };
  window.movePos = function(deg) {
    var pos = state.simValues.position;
    if (!pos) return;
    var rad = deg * Math.PI / 180;
    var dlat = 0.00009 * Math.cos(rad);
    var dlng = 0.00011 * Math.sin(rad);
    var lat = pos.lat + dlat;
    var lng = pos.lng + dlng;
    state.simValues.position = { lat: lat, lng: lng };
    channel.postMessage({ type: 'set-sim-position', lat: lat, lng: lng });
    updateUI();
  };
  window.onSpeed = function(val) {
    var kmh = parseInt(val, 10), ms = kmh / 3.6;
    state.simValues.speed = ms;
    channel.postMessage({ type: 'set-sim-speed', value: ms });
    document.getElementById('speedVal').textContent = kmh + ' km/h';
  };
  window.onAccuracy = function(val) {
    var v = parseInt(val, 10);
    state.simValues.accuracy = v;
    channel.postMessage({ type: 'set-sim-accuracy', value: v });
    document.getElementById('accVal').textContent = v + ' m';
  };
  window.onInterval = function(val) {
    var v = parseInt(val, 10);
    state.simValues.callbackIntervalMs = v;
    channel.postMessage({ type: 'set-sim-interval', value: v });
    document.getElementById('intervalVal').textContent = (v / 1000).toFixed(1) + ' s';
  };
  window.onDeniedChange = function(checked) {
    state.simValues.denied = checked;
    channel.postMessage({ type: 'set-sim-denied', value: checked });
    updateUI();
  };
  window.setDpadMode = function(mode) {
    state.simValues.positionCallbackMode = mode;
    channel.postMessage({ type: 'set-position-callback-mode', value: mode });
    updateUI();
  };
  window.onHeadingSyncChange = function(checked) {
    state.simValues.headingSync = checked;
    channel.postMessage({ type: 'set-heading-sync', value: checked });
  };
  window.onSpeedSyncChange = function(checked) {
    state.simValues.speedSync = checked;
    channel.postMessage({ type: 'set-speed-sync', value: checked });
  };
  updateUI();
})();
</script>
</body>
</html>
